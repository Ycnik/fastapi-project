info:
  name: Suche mit nicht-vorhandenem Nachnamen
  type: graphql
  seq: 7

graphql:
  method: POST
  url: "{{graphqlUrl}}"
  headers:
    - name: ""
      value: ""
      disabled: true
  body:
    query: |-
      {
        soldaten(suchparameter: {nachname: "Nichtvorhanden"}) {
          id
        }
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data.soldaten
      operator: isArray
    - expression: res.body.data.soldaten
      operator: isEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
