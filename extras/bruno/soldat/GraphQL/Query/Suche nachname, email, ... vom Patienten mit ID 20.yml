info:
  name: Suche nachname, email, ... vom Patienten mit ID 20
  type: graphql
  seq: 1

graphql:
  method: POST
  url: "{{graphqlUrl}}"
  headers:
    - name: ""
      value: ""
      disabled: true
  body:
    query: |-
      query ($soldatId: ID! = "20") {
        soldat(soldatId: $soldatId) {
          id
          vorname
          nachname
          ausruestung {
            waffe
          }
          verletzungen {
            behandelt
            verletzungsbezeichnung
          }
        }
      }
    variables: |-
      {
        "patientId": "1"
      }
  auth:
    type: bearer
    token: eyJhbGciOiJSUzI1NiIsInR5cCIgOiAiSldUIiwia2lkIiA6ICJ0eWtfemJOTE9nWUwyQ2NXZEM4MXJiMnBqcUZhU0V1SEp0N3A1RGlwaWprIn0..u7dQDs5Y0tRUoZBuVz-_nFjYBGX6kGypQIeWITO3RCzfvIl2oiowhfB2sq2l3HGXOC8uLvuGLFFKBszJ3bn8pQHlJehOyqRwH-0554wT5Cmw_YNks78Q6xc6BDr10DFulCp5uAtCmQ-RZMH_7B8qLwqbUHcxMkbq0TrPseEsWMeGw6tQiTz_UhNvJYBT_ltbYpgN-ygnA9XpwxjM7mKLkvSuBUF5sU1LdhNHOyFxuG8wNPrApcW8yp4dhHsKuydqgmYjPtREWmfBzLtS3XP770D5eEQMxFEnyI4funWNBv0uZaZCp_JjOCDADmjON1uEPvl4vRTAdzGKarBUBzz8AQ

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data.patient
      operator: isJson
    - expression: res.body.data.patient.version
      operator: gte
      value: "0"
    - expression: res.body.data.patient.nachname
      operator: isString
    - expression: res.body.data.patient.nachname
      operator: isNotEmpty
    - expression: res.body.data.patient.email
      operator: isString
    - expression: res.body.data.patient.email
      operator: isNotEmpty
    - expression: res.body.data.patient.kategorie
      operator: gt
      value: "0"
    - expression: res.body.data.patient.hasNewsletter
      operator: isBoolean
    - expression: res.body.data.patient.geburtsdatum
      operator: isString
    - expression: res.body.data.patient.homepage
      operator: isString
    - expression: res.body.data.patient.geschlecht
      operator: isString
    - expression: res.body.data.patient.familienstand
      operator: isString
    - expression: res.body.data.patient.adresse
      operator: isJson
    - expression: res.body.data.patient.fachaerzte
      operator: isArray
    - expression: res.body.data.patient.username
      operator: isString
    - expression: res.body.data.patient.username
      operator: isNotEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
