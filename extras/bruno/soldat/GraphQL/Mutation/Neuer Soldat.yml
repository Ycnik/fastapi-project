info:
  name: Neuer Soldat
  type: graphql
  seq: 1

graphql:
  method: POST
  url: "{{graphqlUrl}}"
  headers:
    - name: ""
      value: ""
      disabled: true
  body:
    query: |-
      mutation {
        create(
          soldatInput: {
            vorname: "Vornamegraphql"
            nachname: "Nachnamegraphql"
            geburtsdatum: "2022-02-02"
            geschlecht: WEIBLICH
            rang: SOLDAT
            ausruestung: {
              waffe: Klinge
              seriennummer: "AOT-Be1234"
            }
            verletzungen: [{
              verletzungsbezeichnung: "Knochenbruch"
              verletzungsdatum: "2024-03-11"
              schweregrad: MITTEL
              behandelt: true
            }]
            username: "testgraphql"
          }
        ) {
          id
        }
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data
      operator: isJson
    - expression: res.body.data.create.id
      operator: gte
      value: "0"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
